###############################################################
# Maria DB server + PostGreSQL Server + Adminer + PhpMyAdmin
###############################################################
services:

  mariadb:
    build: 
      context: .
      dockerfile: config/mariadb/Dockerfile
    container_name: ${ENV_CONTAINER_NAME}-mariadb
    ports:
      - 3307:3307
    volumes:
    # create persistent docker volume
      - ./data:/var/lib/mariadb
    # mount configuration
      - ./config/:/etc/mariadb/conf.d
    restart: always   
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ALLOW_EMPTY_PASSWORD=no
    networks:
      - mariadb-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    container_name: ${ENV_CONTAINER_NAME}-phpmyadmin
    ports:
      - 8080:80
    links:
      - mariadb:mariadb
    depends_on:
      - "mariadb"
    environment:
      - PMA_ABSOLUTE_URI=${ENV_PHPMYADMIN_URI}
      - PMA_HOST=mariadb
      - UPLOAD_LIMIT=2G
    networks:
      - mariadb-network

  postgres:
    build: 
      context: .
      dockerfile: config/postgres/Dockerfile
    container_name: ${ENV_CONTAINER_NAME}-postgres
    ports:
      - 5432:5432
    volumes:
    # create persistent docker volume
      - ./db-data:/var/lib/postgresql
    restart: always   
    environment:
      - POSTGRES_USER=${POSTGRES_USER} 
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}

    networks:
      - postgres-network

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    depends_on:
      - "postgres"
      - "mariadb"
    ports:
      - "8081:8080"
    #environment:
      #ADMINER_DEFAULT_SERVER: postgres
    networks:
      - mariadb-network
      - postgres-network
    
# default network for this docker stack
networks:
  mariadb-network:
    driver: bridge
  postgres-network:
    driver: bridge